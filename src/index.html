<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BILEA - Browser Integrated Local Execution Agent</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        #left-pane {
            /* The left pane is covered by BrowserView */
            width: 50%;
            height: 100%;
            background-color: #f0f0f0;
        }
        #right-pane {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #ccc;
        }
        #terminal {
            flex-grow: 1;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .confirmation-box {
            background-color: #444;
            border: 1px solid #666;
            padding: 10px;
            margin-top: 5px;
            border-radius: 4px;
        }
        .btn {
            padding: 5px 10px;
            margin-right: 5px;
            cursor: pointer;
            border: none;
            border-radius: 3px;
            font-weight: bold;
        }
        .btn-confirm {
            background-color: #4caf50;
            color: white;
        }
        .btn-reject {
            background-color: #f44336;
            color: white;
        }
        #terminal-header {
            background-color: #333;
            color: white;
            padding: 5px 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="left-pane"></div>
    <div id="right-pane">
        <div id="terminal-header">
            Local Execution Terminal
            <button id="btn-read-file" style="float: right; margin-top: -2px;">Read File</button>
        </div>
        <div id="terminal">Waiting for commands...</div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
